# ============================================================
# Botica V&R — Publicar imágenes en GitHub Container Registry
#
# Al publicar un Release en el repositorio, construye y sube las
# imágenes de contenedor del frontend y del backend a ghcr.io.
#
# Imágenes generadas:
#   ghcr.io/alonso3107/webdiseoempresarial-frontend
#   ghcr.io/alonso3107/webdiseoempresarial-backend
#
# Cada imagen se etiqueta con el tag del release (ej. v1.0.0)
# y también con `latest`.
# ============================================================

name: Publicar imágenes (ghcr.io)

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  # ────────────────────────────────────────────────────────
  # Construye y publica ambas imágenes en paralelo (matriz)
  # ────────────────────────────────────────────────────────
  publicar:
    name: Construir y publicar (${{ matrix.componente }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - componente: frontend
            contexto: ./Frontend/BoticaVR
            imagen: ghcr.io/alonso3107/webdiseoempresarial-frontend
          - componente: backend
            contexto: ./Backend
            imagen: ghcr.io/alonso3107/webdiseoempresarial-backend

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesión en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular etiquetas de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.imagen }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }}
            type=raw,value=latest

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.contexto }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
